<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Devil's Due — it only looks easy</title>
<style>
  html,body{margin:0;height:100%;background:#05040a;color:#cdd3df;font-family:system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;overflow:hidden;touch-action:none}
  .bar{display:flex;gap:16px;align-items:center;font-size:13px;letter-spacing:.5px}
  .bar .nm{color:#ff5d6c;font-weight:700;letter-spacing:1px}
  .bar .s{color:#8a90a0}
  canvas{image-rendering:auto;border-radius:10px;box-shadow:0 24px 70px rgba(0,0,0,.7);background:#05040a;display:block;max-width:100vw}
  .hint{font-size:12px;color:#6a7080}.hint b{color:#aab0c0}
  a.back{position:fixed;left:14px;top:12px;font-size:12px;color:#6a7080;text-decoration:none;z-index:5}a.back:hover{color:#ff5d6c}
  .touch{position:fixed;bottom:14px;left:0;right:0;display:none;justify-content:space-between;padding:0 16px;pointer-events:none}
  .touch button{pointer-events:auto;width:74px;height:74px;border-radius:50%;border:1px solid #3a2350;background:rgba(40,20,40,.6);
    color:#ffcf5c;font-size:26px;font-weight:800;-webkit-tap-highlight-color:transparent}
  .touch .rt{display:flex;gap:12px}
  @media (pointer:coarse){.touch{display:flex}}
</style></head>
<body>
  <a class="back" href="index.html">‹ back</a>
  <div class="bar"><span class="nm" id="hud-name">DEVIL'S DUE</span><span class="s" id="hud-l">LEVEL 1/5</span><span class="s" id="hud-d">DEATHS 0</span></div>
  <canvas id="game" width="800" height="480"></canvas>
  <div class="hint"><b>← → / A D</b> move · <b>Space / ↑ / W</b> jump · <b>R</b> restart · <i>it only looks easy</i></div>
  <div class="touch">
    <button id="t-l" tabindex="-1">‹</button>
    <div class="rt"><button id="t-j" tabindex="-1">▲</button><button id="t-r" tabindex="-1">›</button></div>
  </div>
  <script src="levels.js"></script>
  <script src="engine.js"></script>
  <script>Due.init();</script>
</body></html>
